; PlatformIO configuration for development and testing
;
; Run protocol tests: .venv/bin/pio test -e native
; Compile for ESP32:  .venv/bin/pio run -e esp32

[platformio]
test_dir = test

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -DUNIT_TEST
    -I components/sma_bluetooth
; Only compile the protocol layer for native tests (no ESP32 headers needed)
build_src_filter =
    -<*>

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
build_flags =
    -std=c++17
    -I components/sma_bluetooth
build_src_filter =
    +<../components/sma_bluetooth/*.cpp>
test_ignore = test_native/*
