# Whitelist mode — only connect to specific inverters
esphome:
  name: sma-gateway
  friendly_name: SMA Solar Gateway

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source: github://egnerfl/esphome_sma_bluetooth
    components: [sma_bluetooth]

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: sntp
    id: sntp_time

sma_bluetooth:
  passwords:
    - "0000"
    - "1111"
  inverters:
    - mac_address: "00:80:25:AA:BB:CC"
      name: "East Roof"
    - mac_address: "00:80:25:DD:EE:FF"
      name: "West Roof"
    - mac_address: "00:80:25:11:22:33"
      name: "Garage"
      password: "1234"   # this inverter has a different password
