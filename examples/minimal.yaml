# Simplest possible config — autodiscovery with defaults
esphome:
  name: sma-gateway
  friendly_name: SMA Solar Gateway

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source: github://egnerfl/esphome_sma_bluetooth
    components: [sma_bluetooth]

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: sntp
    id: sntp_time

# Plug and play — discovers all SMA inverters nearby,
# tries default passwords, auto-creates all sensors
sma_bluetooth:
