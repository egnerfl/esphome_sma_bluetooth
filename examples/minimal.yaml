# Simplest possible config — autodiscovery with defaults
esphome:
  name: sma-gateway
  friendly_name: SMA Solar Gateway

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "y"
      CONFIG_BT_CLASSIC_ENABLED: "y"
      CONFIG_BT_SPP_ENABLED: "y"
      CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY: "y"
      CONFIG_BT_BLE_ENABLED: "n"

external_components:
  - source:
      type: local
      path: components

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: sntp
    id: sntp_time

# Plug and play — discovers all SMA inverters nearby,
# tries default passwords, auto-creates all sensors
sma_bluetooth:
