# Manual mode — no autodiscovery, explicit sensor definitions
esphome:
  name: sma-gateway
  friendly_name: SMA Solar Gateway

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "y"
      CONFIG_BT_CLASSIC_ENABLED: "y"
      CONFIG_BT_SPP_ENABLED: "y"
      CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY: "y"
      CONFIG_BT_BLE_ENABLED: "n"

external_components:
  - source:
      type: local
      path: components

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: sntp
    id: sntp_time

# Hub with discovery disabled
sma_bluetooth:
  id: sma_hub
  discovery: false
  query_delay: 200ms
  inter_inverter_delay: 5s

# --- Inverter 1: East Roof ---
sensor:
  - platform: sma_bluetooth
    sma_bluetooth_id: sma_hub
    mac_address: "00:80:25:AA:BB:CC"
    password: "0000"
    name: "East"
    update_interval: 60s

    phase_a:
      voltage:
        name: "East Voltage L1"
      current:
        name: "East Current L1"
      active_power:
        name: "East Power L1"

    pv1:
      voltage:
        name: "East DC Voltage MPPT1"
      current:
        name: "East DC Current MPPT1"
      active_power:
        name: "East DC Power MPPT1"
    pv2:
      voltage:
        name: "East DC Voltage MPPT2"
      current:
        name: "East DC Current MPPT2"
      active_power:
        name: "East DC Power MPPT2"

    frequency:
      name: "East Grid Frequency"
    energy_production_day:
      name: "East Daily Energy"
    total_energy_production:
      name: "East Total Energy"
    inverter_module_temp:
      name: "East Temperature"
    bt_signal_strength:
      name: "East BT Signal"

  # --- Inverter 2: West Roof ---
  - platform: sma_bluetooth
    sma_bluetooth_id: sma_hub
    mac_address: "00:80:25:DD:EE:FF"
    password: "0000"
    name: "West"
    update_interval: 60s

    pv1:
      active_power:
        name: "West DC Power MPPT1"
    energy_production_day:
      name: "West Daily Energy"
    total_energy_production:
      name: "West Total Energy"

  # --- Inverter 3: Garage ---
  - platform: sma_bluetooth
    sma_bluetooth_id: sma_hub
    mac_address: "00:80:25:11:22:33"
    password: "1234"
    name: "Garage"
    update_interval: 120s

    pv1:
      active_power:
        name: "Garage DC Power"
    energy_production_day:
      name: "Garage Daily Energy"
    total_energy_production:
      name: "Garage Total Energy"

# Text sensors
text_sensor:
  - platform: sma_bluetooth
    sma_bluetooth_id: sma_hub
    mac_address: "00:80:25:AA:BB:CC"
    inverter_status:
      name: "East Status"
    serial_number:
      name: "East Serial"
    software_version:
      name: "East Firmware"

# Binary sensors
binary_sensor:
  - platform: sma_bluetooth
    sma_bluetooth_id: sma_hub
    mac_address: "00:80:25:AA:BB:CC"
    grid_relay:
      name: "East Grid Relay"
